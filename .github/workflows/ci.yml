name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint:
    name: Lint and syntax check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install flake8

      - name: Syntax check (all .py files)
        run: |
          python -m py_compile dispatcher.py dispatchService.py
          echo "Syntax OK"

      - name: Flake8 (fatal errors only)
        run: |
          # E9   = syntax/runtime errors
          # F63  = invalid star expressions
          # F7   = syntax errors
          # F82  = undefined names
          flake8 dispatcher.py dispatchService.py \
            --count --select=E9,F63,F7,F82 \
            --show-source --statistics
